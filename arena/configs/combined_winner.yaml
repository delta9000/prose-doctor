prescriptions:
  pd_mean: 'This reads like a camera filming from outside. For the 3-5 most charged
    moments, drop into the character''s body: what do they feel in their chest, their
    hands, their gut? What are they afraid to think about? Replace observation with
    perception.'
  pd_std: The narrative stays at one distance throughout. After an establishing paragraph,
    push in close — sensations, half-formed thoughts, the taste in their mouth. Then
    pull back for the next scene transition. The contrast is the point.
  fg_inversion: Restructure 3-4 sentences where the subject-verb-object order feels
    monotonous. Lead with a prepositional phrase or subordinate clause only when it
    creates genuine emphasis — not as a mechanical pattern.
  fg_sl_cv: 'Sentence lengths are too uniform — the prose has a flat, metronomic rhythm.
    Introduce more variation: follow a long, complex sentence with a short, blunt
    one. Let tension build in short bursts. Let description sprawl when the scene
    calls for it. Aim for peaks and valleys rather than a plateau.'
  fg_fragment: You're overusing short fragments for manufactured emphasis — the technique
    has lost its impact. Each fragment should earn its weight by capturing a beat
    too sharp or too fast for a full sentence. Merge weaker fragments into surrounding
    sentences, and reserve the form for moments where the syntax itself should feel
    interrupted.
  ic_rhythmicity: 'The information density is too regular — every sentence carries
    roughly the same cognitive load, creating a droning effect. Break the pattern:
    compress routine action into a single clause, then expand the emotionally significant
    moment with layered detail. Let the reader''s attention accelerate and decelerate
    rather than cruise at a fixed speed.'
  ic_spikes: 'The passage lacks surprise — information arrives at a predictable rate
    with no spikes of unexpected detail or word choice. Find 4–6 places to introduce
    something the reader couldn''t have predicted: an unusual word, an unexpected
    comparison, a detail that reframes what came before. Surprisal creates engagement;
    without it prose reads as merely competent.'
  ic_flatlines: 'Too many sentences add no new information — they restate, echo, or
    pad. Cut or compress any sentence whose content is already implied by what surrounds
    it. If a sentence exists only to smooth a transition or signal an emotion already
    shown through action, remove it. Every sentence should move something forward:
    plot, character, image, or tone.'
  dr_entropy: The passage relies almost entirely on additive connectives ('and', 'then',
    'also'). Replace some with causal ('because', 'so', 'therefore'), adversative
    ('but', 'although', 'yet'), or conditional ('if', 'unless') relations. Varying
    discourse relation types shows how ideas relate rather than merely listing them,
    and creates a richer logical texture.
  dr_implicit: 'Too many discourse relations are left implicit — the logical or emotional
    links between sentences are unmarked, leaving the reader to infer connections
    that should be felt. Add connective tissue: a ''but'' before the reversal, a ''because''
    before the explanation, a ''so'' before the consequence. Making more relations
    explicit clarifies causality and emotional logic without overexplaining.'
  cn_abstract: The passage sits on the sensory surface without reflection or interpretation.
    Add moments where the point-of-view character draws a conclusion, makes an association,
    voices an opinion, or revisits a memory triggered by what they perceive. Abstract
    thought anchored to concrete sensation creates the impression of a mind at work
    — not just a camera recording events.
  ss_shift_rate: 'The scene is static — no new characters enter, no location changes,
    no time passes, and no topic shifts mark the passage. Break it up: add a time
    reference (''ten minutes later''), move to a new physical position, introduce
    a new object of attention, or bring someone into or out of the scene. Situation
    shifts signal progress and prevent the reader from feeling trapped in amber.'
max_turns: 8
regression_limit: 0.2
temperature: 0.7
