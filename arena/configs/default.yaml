prescriptions:
  pd_mean: "The psychic distance is too far — the prose reads like a report, not lived\
    \ experience. Move closer to the character's perception.\n\nEXAMPLE:\n  Before:\
    \ 'The room was cold. She noticed the window was open.'\n  After:  'Cold air bit\
    \ her arms. The window — who had left it open?'\n  Why: Sensation ('bit her arms')\
    \ replaces observation ('was cold'). Question shows the character's mind, not\
    \ the narrator's.\n\nKEEP AS-IS when the distance is deliberate (establishing\
    \ shots, time skips, moments of shock where the character dissociates)."
  pd_std: "The psychic distance stays flat. Vary it: pull back at scene transitions,\
    \ push close during peak emotion.\n\nEXAMPLE:\n  Before: 'He walked into the bar.\
    \ He felt nervous. He ordered a drink.'\n  After:  'The bar was half-empty, neon\
    \ pooling on wet tables. His stomach clenched as he slid onto the stool. \"Whiskey.\"\
    '\n  Why: Wide shot (neon, tables) then close interiority (stomach) then dialogue.\
    \ Three registers in three sentences."
  fg_inversion: "Too many subject-verb-object sentences. Restructure 2-3 where a different\
    \ opening creates natural emphasis — not as a mechanical pattern.\n\nEXAMPLE:\n\
    \  Before: 'Marcus walked down the corridor. He checked each door.'\n  After:\
    \  'Down the corridor Marcus walked, checking each door.'\n  Why: Prepositional\
    \ opening varies rhythm. Only do this where the fronted element deserves emphasis.\n\
    \nKEEP AS-IS: 'She ran.' (Fragment at a climactic beat — inversion would kill\
    \ it.)"
  fg_sl_cv: "Sentence lengths are too uniform. Mix long flowing sentences with short\
    \ punches.\n\nEXAMPLE:\n  Before: 'He opened the door. He stepped inside. He looked\
    \ around. The room was empty.'\n  After:  'He opened the door and stepped inside,\
    \ scanning the room in one quick sweep. Empty.'\n  Why: Routine action compressed\
    \ into one sentence. The discovery gets its own fragment."
  fg_fragment: "Some fragments don't earn their weight. NOT EVERY FRAGMENT IS BAD.\n\
    \nFIX THIS:\n  Before: 'She paused. The hallway stretched ahead. Dark. Empty.'\n\
    \  After:  'She paused at the mouth of the hallway — dark, empty, stretching ahead.'\n\
    \  Why: 'Dark. Empty.' are vague. Folded into context naturally.\n\nKEEP THIS:\n\
    \  'The gun fired. Smoke. Silence. Then screaming.'\n  Why: Each fragment marks\
    \ a distinct sensory beat. The rhythm IS the content.\n\nRule: if a fragment follows\
    \ a long sentence and carries a visceral detail or tonal shift, leave it. If it's\
    \ generic padding, fold it in."
  ic_rhythmicity: "Information density is too regular — every sentence carries the\
    \ same weight.\n\nEXAMPLE:\n  Before: 'He packed his bag. He checked the map.\
    \ He counted his money. He closed the door.'\n  After:  'He packed the bag, checked\
    \ the map, counted what was left of the money — forty-three dollars and change,\
    \ not enough for the bus.'\n  Why: Routine actions compressed. The money detail\
    \ expands because it matters emotionally."
  ic_spikes: "The prose is too predictable. Inject surprise at 2-3 key moments.\n\n\
    EXAMPLE:\n  Before: 'The old house was quiet. The paint was peeling.'\n  After:\
    \  'The house held its breath. Paint curled from the siding like dead skin.'\n\
    \  Why: 'Held its breath' personifies unexpectedly. 'Dead skin' reframes a mundane\
    \ detail. Both spike the reader's attention."
  ic_flatlines: "Sentences are restating or padding. Cut what's already implied.\n\
    \nEXAMPLE:\n  Before: 'She was angry. Her fists clenched. She felt a surge of\
    \ rage.'\n  After:  'Her fists clenched.'\n  Why: The fists show anger. The label\
    \ ('angry') and restatement ('surge of rage') add nothing."
  dr_entropy: "Too many additive connectives ('and', 'then'). Show logical relationships.\n\
    \nEXAMPLE:\n  Before: 'She opened the door. And the hallway was dark. And she\
    \ stepped inside.'\n  After:  'She opened the door, but the hallway beyond was\
    \ dark. She stepped inside anyway.'\n  Why: 'But' creates contrast (expectation\
    \ vs reality). 'Anyway' shows decision despite the obstacle. Richer than three\
    \ 'and's."
  dr_implicit: "Logical links between sentences are unmarked. Add connective tissue.\n\
    \nEXAMPLE:\n  Before: 'The bridge was out. They took the long way around.'\n \
    \ After:  'The bridge was out, so they took the long way around.'\n  Why: 'So'\
    \ makes the causal link explicit. The reader shouldn't have to infer basic cause\
    \ and effect.\n\nDon't overdo it — not every sentence pair needs a connective.\
    \ Only add them where the logical relationship is non-obvious."
  cn_abstract: "The passage is all surface — no reflection or interpretation.\n\n\
    EXAMPLE:\n  Before: 'The coffee was cold. The mug had a chip in the rim.'\n  After:\
    \  'The coffee had gone cold — how long had she been sitting here? The chip in\
    \ the rim was old, from the move. Another thing she hadn't fixed.'\n  Why: Same\
    \ objects, but now the character's mind is working. The chip triggers a memory\
    \ and a judgment. Concrete detail anchors abstract thought."
  ss_shift_rate: "The scene is static — nothing changes. Add a shift.\n\nEXAMPLE:\n\
    \  Before: 'He sat at the desk. He read the file. He turned the page. He read\
    \ more.'\n  After:  'He sat at the desk reading the file until the light changed\
    \ — late afternoon now, the shadows longer. He turned the page.'\n  Why: Time\
    \ reference ('light changed') signals progress. The reader feels time passing,\
    \ not looping."
max_turns: 8
